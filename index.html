<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Snail Mail" />
  <meta name="format-detection" content="telephone=no" />
  <title>Snail Mail Remastered</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    <div id="hud" class="hidden"></div>
    <div id="ui-root"></div>
  </div>

  <!-- Orientation hint: only shows on touch devices held in portrait. Encourages
       landscape (the track reads best wide). Dismissible; hidden once landscape. -->
  <div id="orient-hint" hidden>
    <div class="orient-hint-card">
      <div class="orient-hint-icon" aria-hidden="true">📱↻</div>
      <div class="orient-hint-title">Rotate for the best ride</div>
      <div class="orient-hint-text">Snail Mail plays best in landscape. Turn your device sideways.</div>
      <button id="orient-hint-dismiss" class="orient-hint-btn" type="button">Play anyway</button>
    </div>
  </div>

  <script>
    // Show/hide the landscape hint. Pure DOM (no game module) so it stays out of
    // src/ui/*. Dismiss is sticky for the session.
    (function () {
      var hint = document.getElementById('orient-hint');
      var dismiss = document.getElementById('orient-hint-dismiss');
      if (!hint) return;
      var dismissed = false;
      var isTouch = ('ontouchstart' in window) ||
        (navigator.maxTouchPoints || 0) > 0 ||
        (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
      function portrait() {
        return window.matchMedia
          ? window.matchMedia('(orientation: portrait)').matches
          : window.innerHeight > window.innerWidth;
      }
      function update() {
        var show = isTouch && !dismissed && portrait();
        hint.hidden = !show;
      }
      dismiss && dismiss.addEventListener('click', function () { dismissed = true; update(); });
      window.addEventListener('resize', update);
      window.addEventListener('orientationchange', function () { setTimeout(update, 200); });
      update();
    })();
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
